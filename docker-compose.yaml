version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: expense_mysql
    environment:
      MYSQL_DATABASE: expense_tracker
      MYSQL_ROOT_PASSWORD: bassam
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: expense_rabbitmq
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # UI port
    environment:
      RABBITMQ_DEFAULT_USER: bassam
      RABBITMQ_DEFAULT_PASS: bassam

  minio:
    image: minio/minio:RELEASE.2024-01-31T20-20-33Z
    container_name: expense_minio
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Console port
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bassam
      MINIO_ROOT_PASSWORD: bassam
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  minio_data:
